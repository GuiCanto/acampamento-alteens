<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alteens - Acampamento</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; padding-bottom: 40px; }

/* Nav */
#nav { background: #512da8; display: flex; align-items: stretch; position: sticky; top: 0; z-index: 20; }
.tab { flex: 1; padding: 14px 8px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.65); background: none; border: none; cursor: pointer; font-family: inherit; border-bottom: 3px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #fff; }
#bell-btn { background: none; border: none; color: rgba(255,255,255,0.8); font-size: 20px; padding: 0 14px; cursor: pointer; position: relative; flex-shrink: 0; }
#bell-badge { position: absolute; top: 8px; right: 8px; background: #f44336; color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; width: 16px; height: 16px; display: none; align-items: center; justify-content: center; }

/* Bell popup */
#bell-popup { display: none; position: fixed; right: 8px; top: 56px; background: #fff; border: 1px solid #ddd; border-radius: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 100; min-width: 260px; max-width: 320px; overflow: hidden; }
#bell-popup.open { display: block; }
.bell-header { background: #fff8e1; padding: 10px 14px; font-size: 12px; font-weight: 700; color: #5d4037; border-bottom: 1px solid #f9a825; }
.bell-item { padding: 10px 14px; font-size: 13px; color: #333; border-bottom: 1px solid #f5f5f5; }
.bell-item:last-child { border-bottom: none; }
.bell-empty { padding: 14px; font-size: 13px; color: #888; text-align: center; }

/* Page header */
.page-header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 12px 16px 10px; position: sticky; top: 48px; z-index: 10; }
.page-header h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.page-subtitle { font-size: 12px; color: #666; margin-bottom: 8px; }
.search-input { width: 100%; padding: 9px 13px; font-size: 15px; border: 1px solid #ccc; border-radius: 10px; background: #f0f0f0; outline: none; -webkit-appearance: none; margin-bottom: 10px; }

/* Filter chips */
.filters { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; padding: 5px 13px; border-radius: 20px; font-size: 13px; font-weight: 500; border: 1.5px solid #ccc; background: #fff; color: #555; cursor: pointer; font-family: inherit; white-space: nowrap; }
.chip.active { background: #512da8; border-color: #512da8; color: #fff; }

/* Stats */
.stats { display: flex; gap: 8px; padding: 10px 16px 0; }
.stat { flex: 1; background: #fff; border-radius: 10px; padding: 10px; text-align: center; border: 1px solid #e0e0e0; }
.stat-n { font-size: 20px; font-weight: 700; }
.stat-l { font-size: 11px; color: #666; margin-top: 1px; }

/* Toolbar */
.toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 0; }
.last-update { font-size: 11px; color: #999; }
.btn-refresh { font-size: 12px; color: #512da8; background: none; border: 1px solid #512da8; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-family: inherit; }

.card-list { padding: 10px 16px; display: flex; flex-direction: column; gap: 10px; }
.empty-msg { text-align: center; color: #888; padding: 40px 20px; font-size: 14px; }

/* ── PAYMENT CARD ── */
.pay-card { background: #fff; border-radius: 12px; border: 1px solid #e0e0e0; padding: 10px 12px; display: flex; align-items: center; gap: 10px; transition: opacity 0.4s; }
.pay-card[data-paystate="contactados"] { opacity: 0.5; }
.pay-card[data-paystate="pagos"] { opacity: 0.3; background: #f1f8e9; border-color: #a5d6a7; }
.pay-photo { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; flex-shrink: 0; cursor: pointer; background: #ede7f6; }
.pay-photo-ph { width: 42px; height: 42px; border-radius: 50%; background: #ede7f6; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #512da8; flex-shrink: 0; }
.pay-info { flex: 1; min-width: 0; }
.pay-name { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pay-parent { font-size: 12px; color: #555; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.multi { display: inline-block; background: #fbe9e7; color: #bf360c; font-size: 10px; padding: 1px 6px; border-radius: 20px; margin-left: 5px; font-weight: 700; vertical-align: middle; }
.btn-wa { display: inline-flex; align-items: center; background: #25D366; color: #fff; border-radius: 10px; padding: 9px 12px; font-size: 13px; font-weight: 700; text-decoration: none; white-space: nowrap; flex-shrink: 0; border: none; cursor: pointer; }
.badge-contacted { font-size: 12px; color: #1565c0; background: #e3f2fd; border-radius: 8px; padding: 8px 10px; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
.badge-paid { font-size: 12px; color: #2e7d32; background: #e8f5e9; border-radius: 8px; padding: 8px 10px; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
.no-phone { font-size: 12px; color: #999; background: #f5f5f5; border-radius: 8px; padding: 8px 10px; white-space: nowrap; flex-shrink: 0; }
.btn-more { background: none; border: none; font-size: 20px; color: #888; cursor: pointer; padding: 4px 6px; flex-shrink: 0; line-height: 1; border-radius: 8px; }

/* ── CAMPER CARD ── */
.camper-card { background: #fff; border-radius: 14px; border: 1px solid #e0e0e0; overflow: hidden; }
.camper-top { display: flex; align-items: flex-start; gap: 12px; padding: 14px 14px 0; }
.camper-photo { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; flex-shrink: 0; cursor: pointer; background: #ede7f6; }
.camper-photo-ph { width: 72px; height: 72px; border-radius: 10px; background: #ede7f6; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 700; color: #512da8; flex-shrink: 0; }
.camper-main { flex: 1; min-width: 0; }
.camper-name { font-size: 15px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.camper-badges { display: flex; gap: 6px; margin-top: 5px; flex-wrap: wrap; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
.badge-age { background: #e8eaf6; color: #3949ab; }
.badge-shirt { background: #fce4ec; color: #c62828; }
.badge-pg { background: #e8f5e9; color: #2e7d32; }
.badge-unpaid { background: #fff3e0; color: #e65100; }
.camper-body { padding: 10px 14px 14px; }
.camper-field { display: flex; gap: 6px; align-items: flex-start; font-size: 13px; margin-top: 6px; }
.camper-field-label { color: #888; min-width: 60px; flex-shrink: 0; }
.camper-field-val { color: #111; flex: 1; }
.camper-actions { display: flex; justify-content: flex-end; margin-top: 12px; gap: 8px; }
.btn-edit { font-size: 13px; color: #512da8; background: #ede7f6; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-weight: 600; font-family: inherit; }
.btn-save { font-size: 13px; color: #fff; background: #512da8; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-weight: 600; font-family: inherit; }
.btn-cancel-edit { font-size: 13px; color: #666; background: #f0f0f0; border: none; border-radius: 8px; padding: 7px 14px; cursor: pointer; font-weight: 600; font-family: inherit; }
.edit-field { display: flex; gap: 6px; align-items: center; font-size: 13px; margin-top: 8px; }
.edit-field label { color: #888; min-width: 60px; flex-shrink: 0; font-size: 12px; }
.edit-field input, .edit-field select { flex: 1; padding: 7px 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: #fafafa; }
.saving-indicator { font-size: 13px; color: #512da8; text-align: center; padding: 8px; }

/* Lightbox */
#lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 500; align-items: center; justify-content: center; }
#lightbox.open { display: flex; }
#lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 12px; object-fit: contain; }
#lightbox-close { position: absolute; top: 16px; right: 16px; color: #fff; font-size: 32px; cursor: pointer; line-height: 1; background: none; border: none; }

/* Menu popup */
#menu-popup { display: none; position: fixed; background: #fff; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 100; min-width: 200px; overflow: hidden; }
.menu-item { display: block; width: 100%; text-align: left; padding: 13px 16px; font-size: 14px; background: none; border: none; cursor: pointer; font-family: inherit; color: #111; }
.menu-item:active { background: #f5f5f5; }
.menu-item.danger { color: #c62828; }
.menu-item.success { color: #2e7d32; }
.menu-separator { height: 1px; background: #eee; }

/* Confirm dialog */
#confirm-dialog { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; }
#confirm-dialog.show { display: flex; }
.dialog-box { background: #fff; border-radius: 16px; padding: 24px 20px; margin: 16px; max-width: 340px; width: 100%; }
.dialog-box h3 { font-size: 17px; margin-bottom: 8px; }
.dialog-box p { font-size: 14px; color: #555; margin-bottom: 20px; line-height: 1.5; }
.dialog-btns { display: flex; gap: 10px; }
.dialog-btns button { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 600; border: none; cursor: pointer; font-family: inherit; }
.btn-cancel-dialog { background: #f0f0f0; color: #333; }
.btn-confirm-pg { background: #2e7d32; color: #fff; }

#overlay { display: none; position: fixed; inset: 0; z-index: 99; }
.error-box { margin: 12px 16px; background: #ffebee; border: 1px solid #e57373; border-radius: 10px; padding: 12px 14px; font-size: 13px; color: #b71c1c; }
.btn-retry { display: inline-block; margin-top: 6px; font-size: 13px; color: #1976d2; text-decoration: underline; cursor: pointer; background: none; border: none; padding: 0; font-family: inherit; }
</style>
</head>
<body>

<div id="nav">
  <button class="tab active" id="tab-pay" onclick="showPage('pay')">Pagamentos</button>
  <button class="tab" id="tab-roster" onclick="showPage('roster')">Inscritos</button>
  <button id="bell-btn" onclick="toggleBell(event)" title="Notificacoes">&#128276;<div id="bell-badge"></div></button>
</div>

<!-- Bell popup -->
<div id="bell-popup">
  <div class="bell-header">&#9888; Sem telefone valido</div>
  <div id="bell-list"></div>
</div>

<!-- ═══ PAGE 1: PAGAMENTOS ═══ -->
<div id="page-pay">
  <div class="page-header">
    <h2>Controle de Pagamentos</h2>
    <p class="page-subtitle" id="pay-subtitle">Carregando...</p>
    <input class="search-input" id="pay-search" placeholder="Buscar filho ou responsavel..." oninput="applyPayFilter()" disabled>
    <div class="filters" id="pay-filters">
      <button class="chip active" onclick="setPayFilter('todos',this)">Todos</button>
      <button class="chip" onclick="setPayFilter('pendentes',this)">Pendentes</button>
      <button class="chip" onclick="setPayFilter('contactados',this)">Contactados</button>
      <button class="chip" onclick="setPayFilter('pagos',this)">Pagos</button>
    </div>
  </div>
  <div class="stats" id="pay-stats" style="display:none;">
    <div class="stat"><div class="stat-n" id="ctr-pend">-</div><div class="stat-l">pendentes</div></div>
    <div class="stat"><div class="stat-n" id="ctr-contacted">-</div><div class="stat-l">contactados</div></div>
    <div class="stat"><div class="stat-n" id="ctr-pg">-</div><div class="stat-l">pagos</div></div>
  </div>
  <div class="toolbar" id="pay-toolbar" style="display:none;">
    <span class="last-update" id="last-update"></span>
    <button class="btn-refresh" onclick="loadData()">&#8635; Atualizar</button>
  </div>
  <div id="pay-error" class="error-box" style="display:none;">Nao foi possivel carregar os dados.<br><button class="btn-retry" onclick="loadData()">Tentar novamente</button></div>
  <div class="card-list" id="pay-list"><p class="empty-msg">Carregando dados da planilha...</p></div>
</div>

<!-- ═══ PAGE 2: INSCRITOS ═══ -->
<div id="page-roster" style="display:none;">
  <div class="page-header">
    <h2>Inscritos</h2>
    <p class="page-subtitle" id="roster-subtitle">Carregando...</p>
    <input class="search-input" id="roster-search" placeholder="Buscar nome, pais, alergia..." oninput="applyRosterFilter()" disabled>
    <div class="filters">
      <button class="chip active" onclick="setRosterFilter('todos',this)">Todos</button>
      <button class="chip" onclick="setRosterFilter('pagos',this)">Pagos</button>
      <button class="chip" onclick="setRosterFilter('pendentes',this)">Pendentes</button>
    </div>
  </div>
  <div id="roster-error" class="error-box" style="display:none;">Nao foi possivel carregar os dados.<br><button class="btn-retry" onclick="loadData()">Tentar novamente</button></div>
  <div class="card-list" id="roster-list"></div>
</div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- Menu popup -->
<div id="overlay" onclick="closeAll()"></div>
<div id="menu-popup">
  <button class="menu-item danger" id="menu-undo" onclick="menuUndo()">Desfazer contactado</button>
  <div class="menu-separator"></div>
  <button class="menu-item success" id="menu-pg" onclick="menuConfirmPG()">Confirmar pagamento (PG)</button>
</div>

<!-- Confirm dialog -->
<div id="confirm-dialog">
  <div class="dialog-box">
    <h3>Confirmar pagamento?</h3>
    <p id="dialog-msg">Isso vai marcar como PG na planilha.</p>
    <div class="dialog-btns">
      <button class="btn-cancel-dialog" onclick="closeDialog()">Cancelar</button>
      <button class="btn-confirm-pg" onclick="executePG()">Confirmar</button>
    </div>
  </div>
</div>

<script>
var SHEET_URL = 'https://docs.google.com/spreadsheets/d/1k8z0-76nVw15gvWAKidFPWJAgKU-tAMoXzT9qxm6s3M/gviz/tq?tqx=out:json';
var APPS_URL = 'https://script.google.com/macros/s/AKfycbwNIL8HTNstFL5VLv3iXg_nenDwDQWdZq3B3Z8CqWK1oWH7rxAyJrvaUFcN8bWDs_Gb/exec';
var MSG = encodeURIComponent('Oi tudo bem? Nos estamos finalizando os preparativos para o nosso acampamento do Alteens, vimos que voce fez a inscricao do seu filho(a), mas nao encontrei o comprovante de pagamento, se voce ja fez, poderia me encaminhar aqui por gentileza? caso nao me avisa pra que a gente possa efetuar o pagamento.');

// v4: stores child names (strings) instead of numeric indices
var KEY_C = 'acamp_cont_v4';
var KEY_P = 'acamp_paid_v4';

var allCampers = [];
var activeMenuName = null;
var loadTimer = null;
var payFilter = 'todos';
var rosterFilter = 'todos';
var editingIdx = -1;

// ── UTILS ──
function getVal(c){ return (!c||c.v===null||c.v===undefined)?'':String(c.v); }
function cleanPhone(r){
  if(!r||r.indexOf('#')>=0) return null;
  var d=r.replace(/\D/g,'');
  if(!d||d.length<8) return null;
  if(d[0]==='0') d=d.slice(1);
  if(d.slice(0,2)!=='55') d='55'+d;
  return d;
}
function initials(n){ var p=n.trim().split(/\s+/); return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase(); }
function norm(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,''); }
function getList(k){ try{return JSON.parse(localStorage.getItem(k)||'[]');}catch(e){return[];} }
function saveList(k,a){ try{localStorage.setItem(k,JSON.stringify(a));}catch(e){} }
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── NAV ──
function showPage(p){
  document.getElementById('page-pay').style.display=p==='pay'?'':'none';
  document.getElementById('page-roster').style.display=p==='roster'?'':'none';
  document.getElementById('tab-pay').classList.toggle('active',p==='pay');
  document.getElementById('tab-roster').classList.toggle('active',p==='roster');
}

// ── LIGHTBOX ──
function openLightbox(src){ document.getElementById('lightbox-img').src=src; document.getElementById('lightbox').classList.add('open'); }
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); document.getElementById('lightbox-img').src=''; }

// ── BELL ──
function toggleBell(e){
  e.stopPropagation();
  var p=document.getElementById('bell-popup');
  p.classList.toggle('open');
}
function closeBell(){ document.getElementById('bell-popup').classList.remove('open'); }

function updateBell(){
  var noPhone=allCampers.filter(function(d){ return !d.pago && !d.phone; });
  var badge=document.getElementById('bell-badge');
  var list=document.getElementById('bell-list');
  if(noPhone.length>0){
    badge.textContent=noPhone.length; badge.style.display='flex';
    list.innerHTML=noPhone.map(function(d){
      return '<div class="bell-item"><strong>'+d.child+'</strong><br><span style="color:#888;font-size:12px">'+d.parent+'</span></div>';
    }).join('');
  } else {
    badge.style.display='none';
    list.innerHTML='<div class="bell-empty">Todos tem telefone valido.</div>';
  }
}

// ── DATA LOADING ──
window.google=window.google||{};
window.google.visualization=window.google.visualization||{};
window.google.visualization.Query=window.google.visualization.Query||{};
window.google.visualization.Query.setResponse=function(d){ window.handleSheetData(d); };

window.handleSheetData=function(data){
  if(loadTimer){clearTimeout(loadTimer);loadTimer=null;}
  var old=document.getElementById('jsonp-script');
  if(old) old.parentNode.removeChild(old);
  try{
    var rows=data.table.rows;
    var byName={};
    for(var i=0;i<rows.length;i++){
      var c=rows[i].c;
      if(!c||c.length<11) continue;
      var name=getVal(c[1]).trim(); if(!name) continue;
      var pago=getVal(c[11]).toUpperCase();
      var isPaid=pago.indexOf('PG')>=0;
      var ts=getVal(c[0]);
      if(!byName[name]||ts>byName[name].ts){
        var wasPaid=byName[name]?byName[name].pago:false;
        byName[name]={ts:ts,child:name,parent:getVal(c[5]).trim(),phone:cleanPhone(getVal(c[6])),
          age:getVal(c[4]),camiseta:getVal(c[9]),alergia:getVal(c[7]),photo:getVal(c[10]),pago:isPaid||wasPaid};
      } else if(isPaid){ byName[name].pago=true; }
    }
    allCampers=Object.keys(byName).map(function(k){return byName[k];}).sort(function(a,b){return a.child.localeCompare(b.child);});
    renderPay(); renderRoster(); updateBell();
    var now=new Date();
    document.getElementById('last-update').textContent='Atualizado '+now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  }catch(e){showPayError();showRosterError();}
};

function loadData(){
  document.getElementById('pay-list').innerHTML='<p class="empty-msg">Carregando...</p>';
  document.getElementById('roster-list').innerHTML='';
  ['pay-error','roster-error'].forEach(function(id){document.getElementById(id).style.display='none';});
  ['pay-stats','pay-toolbar'].forEach(function(id){document.getElementById(id).style.display='none';});
  document.getElementById('pay-search').disabled=true;
  document.getElementById('roster-search').disabled=true;
  var old=document.getElementById('jsonp-script'); if(old) old.parentNode.removeChild(old);
  var s=document.createElement('script'); s.id='jsonp-script';
  s.src=SHEET_URL+'&_='+Date.now();
  s.onerror=function(){showPayError();showRosterError();};
  document.head.appendChild(s);
  loadTimer=setTimeout(function(){showPayError();showRosterError();},10000);
}
function showPayError(){ document.getElementById('pay-list').innerHTML=''; document.getElementById('pay-error').style.display='block'; document.getElementById('pay-subtitle').textContent='Erro ao carregar'; }
function showRosterError(){ document.getElementById('roster-error').style.display='block'; document.getElementById('roster-subtitle').textContent='Erro ao carregar'; }

// ══════════════════════════
// ── PAGE 1: PAGAMENTOS ──
// ══════════════════════════

// State uses child names as keys (stored in localStorage as arrays of strings)
function getPayStateName(name, pagoFromSheet){
  var paid=getList(KEY_P), contacted=getList(KEY_C);
  if(pagoFromSheet || paid.indexOf(name)>=0) return 'pagos';
  if(contacted.indexOf(name)>=0) return 'contactados';
  return 'pendentes';
}

function updatePayCounters(){
  var pend=0, cont=0, pag=0;
  allCampers.forEach(function(d){
    var s=getPayStateName(d.child,d.pago);
    if(s==='pendentes') pend++;
    else if(s==='contactados') cont++;
    else pag++;
  });
  document.getElementById('ctr-pend').textContent=pend;
  document.getElementById('ctr-contacted').textContent=cont;
  document.getElementById('ctr-pg').textContent=pag;
}

function applyPayStates(){
  allCampers.forEach(function(d){
    var card=document.getElementById('pc-'+d.child.replace(/\s+/g,'_'));
    if(!card) return;
    var state=getPayStateName(d.child,d.pago);
    card.dataset.paystate=state;
    var waEl=document.getElementById('wa-'+d.child.replace(/\s+/g,'_'));
    var bdEl=document.getElementById('bd-'+d.child.replace(/\s+/g,'_'));
    var bpEl=document.getElementById('bp-'+d.child.replace(/\s+/g,'_'));
    if(waEl) waEl.style.display=(state==='pendentes')?'inline-flex':'none';
    if(bdEl) bdEl.style.display=(state==='contactados')?'inline-block':'none';
    if(bpEl) bpEl.style.display=(state==='pagos')?'inline-block':'none';
  });
  updatePayCounters();
  applyPayFilter();
}

function setPayFilter(f,btn){
  payFilter=f;
  document.querySelectorAll('#pay-filters .chip').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');
  applyPayFilter();
}

function applyPayFilter(){
  var q=norm(document.getElementById('pay-search').value||'');
  document.querySelectorAll('.pay-card').forEach(function(card){
    var state=card.dataset.paystate||'pendentes';
    var matchFilter=(payFilter==='todos'||payFilter===state);
    var matchSearch=(!q||card.dataset.search.indexOf(q)>=0);
    card.style.display=(matchFilter&&matchSearch)?'flex':'none';
  });
}

function markContacted(name){
  var a=getList(KEY_C); if(a.indexOf(name)<0){a.push(name);saveList(KEY_C,a);}
  setTimeout(applyPayStates,600);
}

function renderPay(){
  var phoneCount={};
  allCampers.forEach(function(d){if(d.phone) phoneCount[d.phone]=(phoneCount[d.phone]||0)+1;});
  var html='';
  allCampers.forEach(function(d){
    var safeId=d.child.replace(/\s+/g,'_');
    var multi=(d.phone&&phoneCount[d.phone]>1)?'<span class="multi">+irmao</span>':'';
    var photoHtml=d.photo
      ?'<img class="pay-photo" src="'+d.photo+'" onclick="openLightbox(\''+d.photo+'\')" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
       +'<div class="pay-photo-ph" style="display:none">'+initials(d.child)+'</div>'
      :'<div class="pay-photo-ph">'+initials(d.child)+'</div>';
    var btns;
    if(d.pago){
      btns='<span class="badge-paid">Pago ✓</span>';
    } else if(d.phone){
      btns='<a id="wa-'+safeId+'" class="btn-wa" href="https://wa.me/'+d.phone+'?text='+MSG+'" target="_blank" onclick="markContacted(\''+escHtml(d.child)+'\')">WhatsApp</a>'
          +'<span id="bd-'+safeId+'" class="badge-contacted" style="display:none">Contactado</span>'
          +'<span id="bp-'+safeId+'" class="badge-paid" style="display:none">Pago ✓</span>';
    } else {
      btns='<span class="no-phone">Sem telefone</span>'
          +'<span id="bp-'+safeId+'" class="badge-paid" style="display:none">Pago ✓</span>';
    }
    var showMenu=!d.pago;
    html+='<div id="pc-'+safeId+'" class="pay-card" data-paystate="'+getPayStateName(d.child,d.pago)+'" data-search="'+norm(d.child+' '+d.parent)+'" data-name="'+escHtml(d.child)+'">'
      +photoHtml
      +'<div class="pay-info"><div class="pay-name">'+d.child+multi+'</div><div class="pay-parent">'+d.parent+'</div></div>'
      +btns
      +(showMenu?'<button class="btn-more" onclick="toggleMenu(event,\''+escHtml(d.child)+'\')">&#8942;</button>':'')
      +'</div>';
  });
  document.getElementById('pay-list').innerHTML=html||'<p class="empty-msg">Nenhum resultado.</p>';
  document.getElementById('pay-stats').style.display='flex';
  document.getElementById('pay-toolbar').style.display='flex';
  document.getElementById('pay-search').disabled=false;
  var unpaid=allCampers.filter(function(d){return !d.pago;}).length;
  document.getElementById('pay-subtitle').textContent='Acampamento Alteens — '+unpaid+' pendentes na planilha';
  applyPayStates();
}

// ── PAGE 1 MENU ──
function toggleMenu(event,name){
  event.stopPropagation();
  if(activeMenuName===name){closeMenu();return;}
  activeMenuName=name;
  var btn=event.currentTarget, popup=document.getElementById('menu-popup');
  var c=getList(KEY_C), p=getList(KEY_P);
  document.getElementById('menu-undo').style.display=(c.indexOf(name)>=0&&p.indexOf(name)<0)?'block':'none';
  document.getElementById('menu-pg').style.display=p.indexOf(name)<0?'block':'none';
  var rect=btn.getBoundingClientRect();
  popup.style.right='16px'; popup.style.left='auto'; popup.style.top=(rect.bottom+4)+'px';
  popup.style.display='block'; document.getElementById('overlay').style.display='block';
}
function closeMenu(){ activeMenuName=null; document.getElementById('menu-popup').style.display='none'; document.getElementById('overlay').style.display='none'; }
function closeAll(){ closeMenu(); closeBell(); }
function menuUndo(){
  var name=activeMenuName; closeMenu();
  saveList(KEY_C,getList(KEY_C).filter(function(x){return x!==name;}));
  applyPayStates();
}
function menuConfirmPG(){
  var name=activeMenuName; closeMenu(); activeMenuName=name;
  document.getElementById('dialog-msg').innerHTML='Marcar <strong>'+name+'</strong> como pago (PG) na planilha?';
  document.getElementById('confirm-dialog').classList.add('show');
}
function closeDialog(){ document.getElementById('confirm-dialog').classList.remove('show'); activeMenuName=null; }
function executePG(){
  var name=activeMenuName; closeDialog();
  // Update locally first so the UI reflects immediately
  var p=getList(KEY_P); if(p.indexOf(name)<0){p.push(name);saveList(KEY_P,p);}
  saveList(KEY_C,getList(KEY_C).filter(function(x){return x!==name;}));
  applyPayStates(); updateBell();
  // Sync to sheet in background
  fetch(APPS_URL+'?action=pg&name='+encodeURIComponent(name))
    .catch(function(){
      // Revert local state on failure
      saveList(KEY_P,getList(KEY_P).filter(function(x){return x!==name;}));
      applyPayStates(); updateBell();
      alert('Erro ao atualizar planilha. Verifique conexao.');
    });
}

// ══════════════════════════
// ── PAGE 2: INSCRITOS ──
// ══════════════════════════
function setRosterFilter(f,btn){
  rosterFilter=f;
  document.querySelectorAll('#page-roster .chip').forEach(function(c){c.classList.remove('active');});
  btn.classList.add('active');
  applyRosterFilter();
}

function applyRosterFilter(){
  var q=norm(document.getElementById('roster-search').value||'');
  document.querySelectorAll('.camper-card').forEach(function(el){
    var matchFilter=(rosterFilter==='todos')||(rosterFilter==='pagos'&&el.dataset.paid==='1')||(rosterFilter==='pendentes'&&el.dataset.paid==='0');
    var matchSearch=(!q||el.dataset.search.indexOf(q)>=0);
    el.style.display=(matchFilter&&matchSearch)?'':'none';
  });
}

function renderRoster(){
  var html='';
  allCampers.forEach(function(d,i){
    var alergia=(d.alergia&&d.alergia.trim()&&norm(d.alergia)!=='nao')?d.alergia:'Nenhuma';
    var photoHtml=d.photo
      ?'<img class="camper-photo" src="'+d.photo+'" onclick="openLightbox(\''+d.photo+'\')" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'
       +'<div class="camper-photo-ph" style="display:none">'+initials(d.child)+'</div>'
      :'<div class="camper-photo-ph">'+initials(d.child)+'</div>';
    var paidBadge=d.pago?'<span class="badge badge-pg">Pago ✓</span>':'<span class="badge badge-unpaid">Pendente</span>';
    var search=norm(d.child+' '+d.parent+' '+(d.alergia||''));
    html+='<div class="camper-card" id="cc'+i+'" data-search="'+search+'" data-paid="'+(d.pago?'1':'0')+'">'
      +'<div class="camper-top">'+photoHtml
        +'<div class="camper-main"><div class="camper-name">'+d.child+'</div>'
          +'<div class="camper-badges">'+(d.age?'<span class="badge badge-age">'+d.age+' anos</span>':'')
            +(d.camiseta?'<span class="badge badge-shirt">Camiseta '+d.camiseta+'</span>':'')+paidBadge+'</div>'
        +'</div></div>'
      +'<div class="camper-body" id="cb'+i+'">'
        +'<div class="camper-field"><span class="camper-field-label">Responsavel</span><span class="camper-field-val">'+d.parent+'</span></div>'
        +'<div class="camper-field"><span class="camper-field-label">Telefone</span><span class="camper-field-val">'+(d.phone||'—')+'</span></div>'
        +'<div class="camper-field"><span class="camper-field-label">Alergia</span><span class="camper-field-val">'+alergia+'</span></div>'
        +'<div class="camper-actions"><button class="btn-edit" onclick="startEdit('+i+')">Editar</button></div>'
      +'</div></div>';
  });
  document.getElementById('roster-list').innerHTML=html||'<p class="empty-msg">Sem inscritos.</p>';
  document.getElementById('roster-search').disabled=false;
  document.getElementById('roster-subtitle').textContent=allCampers.length+' inscritos ('+allCampers.filter(function(d){return d.pago;}).length+' pagos)';
}

function startEdit(i){
  if(editingIdx>=0) cancelEdit(editingIdx);
  editingIdx=i; var d=allCampers[i];
  var sizes=['PP','P','M','G','GG','10','12','14','16','18','20'];
  var opts=sizes.map(function(s){return '<option value="'+s+'"'+(d.camiseta===s?' selected':'')+'>'+s+'</option>';}).join('');
  document.getElementById('cb'+i).innerHTML=
    '<div class="edit-field"><label>Responsavel</label><input id="ef-parent'+i+'" value="'+escHtml(d.parent)+'"></div>'
   +'<div class="edit-field"><label>Telefone</label><input id="ef-phone'+i+'" value="'+(d.phone||'')+'"></div>'
   +'<div class="edit-field"><label>Alergia</label><input id="ef-alergia'+i+'" value="'+escHtml(d.alergia||'')+'"></div>'
   +'<div class="edit-field"><label>Camiseta</label><select id="ef-shirt'+i+'">'+opts+'</select></div>'
   +'<div class="camper-actions"><button class="btn-cancel-edit" onclick="cancelEdit('+i+')">Cancelar</button><button class="btn-save" onclick="saveEdit('+i+')">Salvar</button></div>';
}

function cancelEdit(i){
  editingIdx=-1; var d=allCampers[i];
  var alergia=(d.alergia&&d.alergia.trim()&&norm(d.alergia)!=='nao')?d.alergia:'Nenhuma';
  document.getElementById('cb'+i).innerHTML=
    '<div class="camper-field"><span class="camper-field-label">Responsavel</span><span class="camper-field-val">'+d.parent+'</span></div>'
   +'<div class="camper-field"><span class="camper-field-label">Telefone</span><span class="camper-field-val">'+(d.phone||'—')+'</span></div>'
   +'<div class="camper-field"><span class="camper-field-label">Alergia</span><span class="camper-field-val">'+alergia+'</span></div>'
   +'<div class="camper-actions"><button class="btn-edit" onclick="startEdit('+i+')">Editar</button></div>';
}

function saveEdit(i){
  var d=allCampers[i];
  var newParent=document.getElementById('ef-parent'+i).value.trim();
  var newPhone=document.getElementById('ef-phone'+i).value.trim();
  var newAlergia=document.getElementById('ef-alergia'+i).value.trim();
  var newShirt=document.getElementById('ef-shirt'+i).value;
  document.getElementById('cb'+i).innerHTML='<div class="saving-indicator">Salvando...</div>';
  var params='action=update&name='+encodeURIComponent(d.child)
    +'&nomePais='+encodeURIComponent(newParent)+'&telPais='+encodeURIComponent(newPhone)
    +'&alergia='+encodeURIComponent(newAlergia)+'&camiseta='+encodeURIComponent(newShirt);
  fetch(APPS_URL+'?'+params)
    .then(function(r){return r.json();})
    .then(function(){
      d.parent=newParent; d.phone=cleanPhone(newPhone)||newPhone; d.alergia=newAlergia; d.camiseta=newShirt;
      editingIdx=-1; cancelEdit(i);
      document.querySelectorAll('#cc'+i+' .badge-shirt').forEach(function(b){b.textContent='Camiseta '+newShirt;});
    })
    .catch(function(){ alert('Erro ao salvar. Verifique sua conexao.'); cancelEdit(i); });
}

// Close bell when clicking outside
document.addEventListener('click', function(e){
  if(!document.getElementById('bell-btn').contains(e.target) && !document.getElementById('bell-popup').contains(e.target)){
    closeBell();
  }
});

loadData();
</script>
